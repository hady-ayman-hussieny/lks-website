<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKS Shop - Shopping Cart</title>
    
    <!-- CSS and Fonts -->
    <link rel="stylesheet" href="lks css.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" />
    <link rel="icon" href="icon/LKS.png">
    
    <script src="java.js" defer></script>
    
    <style>
        /* Shopping Cart Specific Styles */
        .cart-page-wrapper {
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }

        .cart-header {
            text-align: center;
            margin-bottom: 40px;
            color: #1e293b;
        }

        .cart-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .cart-items-section {
            flex: 2;
            min-width: 300px;
        }

        .cart-summary-section {
            flex: 1;
            min-width: 300px;
            background: #f8fafc;
            padding: 30px;
            border-radius: 12px;
            height: fit-content;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .cart-item-details {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 2;
        }

        .cart-item-details img {
            width: 80px;
            height: 100px;
            object-fit:cover;
            border-radius: 8px;
        }

        .cart-item-info h4 {
            margin: 0 0 5px 0;
            color: #1e293b;
            font-size: 16px;
        }

        .cart-item-info p {
            margin: 0;
            color: #64748b;
            font-size: 14px;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            justify-content: center;
        }

        .cart-item-quantity button {
            width: 30px;
            height: 30px;
            border: 1px solid #cbd5e1;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .cart-item-quantity button:hover {
            background: #f1f5f9;
        }

        .cart-item-price {
            font-weight: 600;
            color: #1e293b;
            flex: 1;
            text-align: right;
            font-size: 18px;
        }

        .cart-item-remove {
            color: #ef4444;
            cursor: pointer;
            font-size: 20px;
            margin-left: 20px;
        }

        .cart-summary-section h3 {
            margin-top: 0;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
            color: #1e293b;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #475569;
            font-weight: 500;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
            font-weight: 700;
            font-size: 20px;
            color: #1e293b;
        }

        .checkout-btn {
            display: block;
            width: 100%;
            background: #0284c7;
            color: #fff;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 30px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .checkout-btn:hover {
            background: #0ea5e9;
        }

        .empty-cart-msg {
            text-align: center;
            color: #64748b;
            padding: 50px 0;
        }

        .empty-cart-msg a {
            color: #0284c7;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    
    <!-- =========================
         NAVIGATION BAR
    ========================== -->
    <div class="navbar">
        <div class="lks">
            <a href="lks html.html">
                <img src="icon/lks2.png" alt="Logo">
            </a>
            <ul>
                <li><a href="lks html.html">HOME</a></li>
                <li><a href="woman/html.html">WOMEN</a></li>
                <li><a href="men/html.html">MEN</a></li>
                <li><a href="kids/html.html">KIDS</a></li>
                <li><a href="shoes/html.html">SHOES</a></li>
            </ul>
        </div>
        
        <div class="box">
            <input type="text" placeholder="Search...">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
        
        <div class="prof">
            <a href="logen/logen.html">
                <img src="icon/prof.png" alt="Profile">
            </a>
        </div>
        
        <div class="shop">
            <a href="cart.html">
                <img src="icon/pasket.png" alt="Cart">
            </a> 
        </div>
    </div>

    <!-- =========================
         CART CONTENT OVERRIDE
    ========================== -->
    <div class="cart-page-wrapper">
        <div class="cart-header">
            <h2>Your Shopping Cart</h2>
        </div>

        <div class="cart-container">
            <!-- ITEMS SECTION -->
            <div class="cart-items-section" id="cartItemsContainer">
                <div class="empty-cart-msg">Loading cart...</div>
            </div>

            <!-- SUMMARY SECTION -->
            <div class="cart-summary-section">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="summarySubtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="summary-total">
                    <span>Total</span>
                    <span id="summaryTotal">$0.00</span>
                </div>
                <button class="checkout-btn" onclick="alert('Checkout feature coming soon!')">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <!-- Script to render the Cart -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
        });

        function renderCart() {
            const container = document.getElementById('cartItemsContainer');
            const subtotalEl = document.getElementById('summarySubtotal');
            const totalEl = document.getElementById('summaryTotal');
            
            // Re-fetch cart from localStorage since it might have changed
            let currentCart = JSON.parse(localStorage.getItem('cart')) || [];
            
            if (currentCart.length === 0) {
                container.innerHTML = `<div class="empty-cart-msg">
                                          <h2>Your cart is empty</h2>
                                          <p>Looks like you haven't added anything yet.</p>
                                          <br>
                                          <a href="lks html.html">← Continue Shopping</a>
                                       </div>`;
                subtotalEl.innerText = `$0.00`;
                totalEl.innerText = `$0.00`;
                return;
            }

            let html = '';
            let subtotal = 0;

            currentCart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                
                html += `
                    <div class="cart-item">
                        <div class="cart-item-details">
                            <img src="${item.image}" alt="${item.name}">
                            <div class="cart-item-info">
                                <h4>${item.name}</h4>
                                <p>$${item.price.toFixed(2)} each</p>
                            </div>
                        </div>
                        <div class="cart-item-quantity">
                            <button onclick="updateQuantity('${item.id}', -1)">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQuantity('${item.id}', 1)">+</button>
                        </div>
                        <div class="cart-item-price">
                            $${itemTotal.toFixed(2)}
                        </div>
                        <i class="fas fa-trash cart-item-remove" onclick="removeItem('${item.id}')"></i>
                    </div>
                `;
            });

            container.innerHTML = html;
            subtotalEl.innerText = `$${subtotal.toFixed(2)}`;
            totalEl.innerText = `$${subtotal.toFixed(2)}`;
            
            // Inform java.js badge logic that cart may have changed
            if (typeof updateCartBadge === "function") {
                updateCartBadge();
            }
        }

        function updateQuantity(id, change) {
            let currentCart = JSON.parse(localStorage.getItem('cart')) || [];
            const item = currentCart.find(i => i.id === id);
            
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    currentCart = currentCart.filter(i => i.id !== id);
                }
                localStorage.setItem('cart', JSON.stringify(currentCart));
                
                // Keep the global window object tracking it up to date for the standard script 
                window.cart = currentCart;
                
                renderCart();
            }
        }

        function removeItem(id) {
            let currentCart = JSON.parse(localStorage.getItem('cart')) || [];
            currentCart = currentCart.filter(i => i.id !== id);
            localStorage.setItem('cart', JSON.stringify(currentCart));
            
            window.cart = currentCart;
            renderCart();
        }
    </script>
</body>
</html>
