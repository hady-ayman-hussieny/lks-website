<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKS Shop - Forgot Password</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="logencss.css">
</head>
<body>
    
    <!-- =========================
         FORGOT PASSWORD BOX
    ========================== -->
    <div class="loginbox">
        <div class="login-header">
            <img src="../icon/prof.png" class="login" alt="User Avatar">
        </div>
        
        <h2>Reset Password</h2>
        <p style="text-align: center; margin-bottom: 25px; font-size: 14px; line-height: 1.5; color: #64748b;">
            Enter the email address associated with your account and we'll send you a link to reset your password.
        </p>
        
        <form action="#" method="POST">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>
            
            <input type="submit" value="Send Reset Link" class="btn-submit">
            
            <div class="form-footer">
                <a href="logen.html">Return to Log In</a>
            </div>
        </form>
        
        <!-- Quick back link -->
         <div class="back-home">
             <a href="../index.html">← Back to Home</a>
         </div>
    </div>
    
</body>
</html>
